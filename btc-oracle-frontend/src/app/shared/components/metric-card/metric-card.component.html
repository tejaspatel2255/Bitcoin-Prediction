<div class="metric-card" [class.has-top-border]="!!topBorderColor" [style.borderTopColor]="topBorderColor">
  <ng-container *ngIf="!isLoading; else loadingTemplate">
    <div class="metric-label">
      <span class="icon">{{ icon }}</span>
      <span class="text">{{ label }}</span>
    </div>
    <div class="metric-value">{{ value }}</div>
    <div class="metric-delta" [style.color]="deltaColor">
      {{ delta }}
    </div>
  </ng-container>
  
  <ng-template #loadingTemplate>
    <div class="metric-label" style="display: flex; align-items: center; gap: 8px; margin-bottom: 8px;">
      <app-skeleton width="20px" height="20px" radius="50%"></app-skeleton>
      <app-skeleton width="80px" height="14px"></app-skeleton>
    </div>
    <div style="margin: 12px 0 8px 0;">
      <app-skeleton width="130px" height="26px"></app-skeleton>
    </div>
    <div>
      <app-skeleton width="60px" height="12px"></app-skeleton>
    </div>
  </ng-template>
</div>
