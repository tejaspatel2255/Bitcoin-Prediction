<div class="model-card">
  <div class="icon-box">
    {{ icon }}
  </div>
  <div class="model-info">
    <div class="model-name">{{ name }}</div>
    <div class="model-subtitle">{{ subtitle }}</div>
  </div>
  <div class="model-accuracy" [style.color]="accColor">
    {{ accuracy }}%
  </div>
</div>
