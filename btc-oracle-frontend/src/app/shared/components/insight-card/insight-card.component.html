<div class="insight-card" [style.border-left-color]="borderColor">
  <ng-container *ngIf="isLoading; else contentTpl">
    <div style="margin-bottom: 16px; display: flex; align-items: center; gap: 8px;">
      <app-skeleton width="24px" height="24px" radius="50%"></app-skeleton>
      <app-skeleton width="150px" height="18px"></app-skeleton>
    </div>
    <div style="display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px;">
      <app-skeleton width="100%" height="14px"></app-skeleton>
      <app-skeleton width="95%" height="14px"></app-skeleton>
      <app-skeleton width="98%" height="14px"></app-skeleton>
      <app-skeleton width="60%" height="14px"></app-skeleton>
    </div>
    <div style="display: flex; justify-content: space-between; align-items: center;">
      <app-skeleton width="180px" height="16px" radius="10px"></app-skeleton>
      <app-skeleton width="60px" height="12px"></app-skeleton>
    </div>
  </ng-container>

  <ng-template #contentTpl>
    <div class="card-header">
      <div class="title-group">
        <span class="icon">{{ icon }}</span>
        <h3>{{ title }}</h3>
      </div>
      <button *ngIf="showRefresh" class="refresh-btn" (click)="onRefresh()" title="Refresh Insight">
        🔄
      </button>
    </div>
    
    <p class="insight-text">{{ text }}</p>
    
    <div class="card-footer">
      <span class="provider-badge">via OpenRouter · Gemini Flash</span>
      <span *ngIf="timestamp" class="timestamp">{{ timestamp }}</span>
    </div>
  </ng-template>
</div>
